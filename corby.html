<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<title>Corby BESS — Full Opposition Brief</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --cream:#FBF4E9; --paper:#FBF4E9; --paper-2:#F4EADA; --card:#FFFDF8;
    --ink:#2C2318; --ink-soft:#43362A; --text:#4A4036; --slate:#6E6257;
    --terracotta:#D96E34; --terracotta-2:#E58A50; --rust:#B85520;
    --teal:#4E9C92; --teal-deep:#3D8178; --teal-tint:#DFEEE9;
    --line:#EAD9BF; --line-strong:#DCC7A4;
    --amber-bg:#F9EBD6; --amber-line:#E7C79A; --green-bg:#DFEEE9; --green-line:#B4D8CE;
    --measure:68ch;
    --head:'Plus Jakarta Sans',system-ui,sans-serif;
    --body:'DM Sans',system-ui,-apple-system,sans-serif;
    --serif:var(--head); --sans:var(--body); --mono:var(--body);
    --radius:18px; --radius-sm:12px;
    --shadow-soft:0 10px 40px rgba(94,66,32,.08); --shadow-lift:0 18px 48px rgba(94,66,32,.13);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--text);font-family:var(--body);
    font-size:17px;line-height:1.68;-webkit-font-smoothing:antialiased}
  .wrap{max-width:940px;margin:0 auto;padding:0 24px 120px}
  a{color:var(--teal-deep)}
  ::selection{background:var(--terracotta);color:#fff}

  header.mast{border-bottom:1px solid var(--line);padding:52px 0 30px;margin-bottom:8px}
  .kicker{font-family:var(--body);font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--terracotta);font-weight:700;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .kicker .dot{width:4px;height:4px;border-radius:50%;background:var(--terracotta);display:inline-block}
  h1{font-family:var(--head);font-weight:800;font-size:clamp(34px,6vw,56px);line-height:1.04;
    letter-spacing:-.02em;margin:18px 0 8px;color:var(--ink);text-wrap:balance}
  .sub{font-family:var(--body);font-size:clamp(18px,2.4vw,22px);color:var(--slate);
    margin:0 0 26px;max-width:42ch;line-height:1.5}
  .docmeta{font-family:var(--body);font-size:13px;color:var(--slate);border-top:1px solid var(--line);
    padding-top:18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px 28px}
  .docmeta b{color:var(--ink);font-weight:700;display:block;font-family:var(--body);
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}

  nav.toc{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:26px 30px;margin:32px 0;box-shadow:var(--shadow-soft)}
  nav.toc h2{font-family:var(--body);font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--terracotta);margin:0 0 16px;font-weight:700}
  nav.toc ol{list-style:none;margin:0;padding:0;column-count:2;column-gap:38px}
  @media (max-width:620px){nav.toc ol{column-count:1}}
  nav.toc li{margin-bottom:10px;break-inside:avoid;font-size:14.5px;display:flex;gap:11px;align-items:baseline}
  nav.toc a{text-decoration:none;color:var(--ink)}
  nav.toc a:hover{color:var(--terracotta)}
  nav.toc .n{font-family:var(--body);font-size:12px;color:var(--terracotta);flex:none;font-weight:700;
    font-variant-numeric:tabular-nums}
  nav.toc .part{font-family:var(--body);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--teal-deep);column-span:all;margin:16px 0 10px;font-weight:800}
  nav.toc .part:first-child{margin-top:0}

  .bottomline{background:var(--ink);color:var(--cream);border-radius:var(--radius);
    padding:32px 36px;margin:34px 0 8px;box-shadow:var(--shadow-lift)}
  .bottomline h2{margin:0 0 14px;font-family:var(--body);font-size:12px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--terracotta-2);font-weight:700}
  .bottomline p{margin:0 0 14px;font-size:19px;line-height:1.6;max-width:none;color:#F3E7D4}
  .bottomline p:last-child{margin-bottom:0}
  .bottomline strong{font-family:var(--head);font-weight:700;color:#fff}

  .partdiv{margin:64px 0 0;padding-top:24px;border-top:2px solid var(--terracotta)}
  .partdiv .plabel{font-family:var(--body);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--terracotta);font-weight:800}
  .partdiv .ptitle{font-family:var(--head);font-size:clamp(22px,3vw,30px);margin:6px 0 0;
    font-weight:800;color:var(--ink);letter-spacing:-.01em}

  section{padding:42px 0;border-bottom:1px solid var(--line);scroll-margin-top:20px}
  .measure{max-width:var(--measure)}
  h2.sec{font-family:var(--head);font-size:clamp(23px,3.2vw,32px);line-height:1.14;margin:0 0 10px;
    letter-spacing:-.015em;text-wrap:balance;display:flex;gap:16px;align-items:baseline;
    font-weight:800;color:var(--ink)}
  h2.sec .num{font-family:var(--body);font-size:15px;color:var(--terracotta);font-weight:800;flex:none;
    padding-top:6px;font-variant-numeric:tabular-nums}
  h3{font-family:var(--head);font-weight:700;font-size:16px;letter-spacing:0;margin:26px 0 6px;color:var(--ink)}
  p{margin:0 0 15px;max-width:var(--measure)}
  .lead{font-size:18.5px;color:var(--ink-soft)}
  strong{font-weight:700;color:var(--ink-soft)}
  em.term{font-style:normal;font-weight:700;color:var(--teal-deep)}

  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 20px}
  .chip{font-family:var(--body);font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    padding:5px 12px;border-radius:999px;font-weight:700;border:1px solid transparent}
  .chip.crit{background:var(--terracotta);color:#fff}
  .chip.high{background:var(--amber-bg);color:var(--rust);border-color:var(--amber-line)}
  .chip.leg{background:var(--teal-tint);color:var(--teal-deep);border-color:var(--green-line)}

  .call{border-left:4px solid;padding:18px 22px;margin:22px 0;border-radius:0 var(--radius-sm) var(--radius-sm) 0;
    max-width:var(--measure);font-size:15.5px;line-height:1.6}
  .call .lab{font-family:var(--body);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    font-weight:800;display:block;margin-bottom:8px}
  .call p{margin:0 0 10px;font-size:inherit;max-width:none}.call p:last-child{margin:0}
  .call.bury{background:var(--amber-bg);border-color:var(--terracotta)}
  .call.bury .lab{color:var(--rust)}
  .call.kill{background:var(--green-bg);border-color:var(--teal)}
  .call.kill .lab{color:var(--teal-deep)}
  .call.quote{background:var(--card);border-color:var(--terracotta-2);font-family:var(--body);
    font-size:17px;font-style:italic;box-shadow:var(--shadow-soft);border-radius:var(--radius-sm)}
  .call.quote .src{display:block;margin-top:10px;font-family:var(--body);font-style:normal;
    font-size:12px;color:var(--slate);font-weight:600;letter-spacing:.02em}

  ul.clean{max-width:var(--measure);padding-left:0;list-style:none;margin:15px 0}
  ul.clean li{position:relative;padding-left:26px;margin-bottom:12px}
  ul.clean li::before{content:"";position:absolute;left:2px;top:10px;width:8px;height:8px;
    background:var(--terracotta);border-radius:50%}
  ul.clean li strong{color:var(--ink)}

  .cite{font-family:var(--body);font-size:.85em;color:var(--slate);background:var(--paper-2);
    padding:2px 8px;border-radius:999px;white-space:nowrap;font-weight:600}

  .tablewrap{overflow-x:auto;margin:24px 0;border:1px solid var(--line);border-radius:var(--radius-sm);
    box-shadow:var(--shadow-soft)}
  table{border-collapse:collapse;width:100%;font-size:14px;font-variant-numeric:tabular-nums;background:var(--card)}
  caption{text-align:left;font-family:var(--body);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--rust);padding:14px 16px;border-bottom:1px solid var(--line);background:var(--amber-bg);font-weight:700}
  th,td{text-align:left;padding:10px 16px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-family:var(--body);font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--slate);font-weight:700;background:var(--paper-2)}
  tbody tr:last-child td{border-bottom:none}
  td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--ink)}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:26px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:20px 22px;box-shadow:var(--shadow-soft)}
  .stat .big{font-family:var(--head);font-size:29px;line-height:1;color:var(--terracotta);font-weight:800;
    letter-spacing:-.01em}
  .stat .lab{font-family:var(--body);font-size:11px;letter-spacing:.04em;text-transform:uppercase;
    color:var(--slate);margin-top:9px;font-weight:600}

  ol.steps{counter-reset:s;list-style:none;padding:0;max-width:var(--measure);margin:18px 0}
  ol.steps li{counter-increment:s;position:relative;padding:18px 0 18px 56px;border-top:1px solid var(--line)}
  ol.steps li::before{content:counter(s,decimal-leading-zero);position:absolute;left:0;top:16px;
    font-family:var(--body);font-size:13px;color:#fff;background:var(--terracotta);
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
  ol.steps li h3{margin:0 0 3px}

  .qbank{max-width:var(--measure);margin:18px 0;display:flex;flex-direction:column;gap:0}
  .qbank .q{border-top:1px solid var(--line);padding:16px 0 16px 24px;position:relative;font-size:15.5px}
  .qbank .q::before{content:"?";position:absolute;left:0;top:15px;font-family:var(--head);
    font-weight:800;color:var(--terracotta);font-size:19px}
  .qbank .q b{font-family:var(--body);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--teal-deep);display:block;margin-bottom:4px;font-weight:800}

  .letter{max-width:var(--measure);background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:26px 30px;margin:18px 0;font-size:15px;box-shadow:var(--shadow-soft)}
  .letter h4{font-family:var(--body);font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--terracotta);margin:20px 0 5px;font-weight:800}
  .letter h4:first-child{margin-top:0}
  .letter p{margin:0 0 8px;font-size:inherit}

  footer{padding:40px 0 0;font-family:var(--body);font-size:13px;color:var(--slate);line-height:1.7}
  .disc{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:18px 22px;font-size:13.5px;color:var(--slate);margin-top:26px;max-width:var(--measure)}

  @media (max-width:560px){
    body{font-size:16px}
    h2.sec{flex-direction:column;gap:2px}
    h2.sec .num{padding-top:0}
    .bottomline{padding:26px 24px}
  }

  a.cx, a.cxb{color:var(--teal-deep);text-decoration:none;border-bottom:1px dotted var(--teal);
    cursor:pointer;font-family:inherit}
  a.cx:hover, a.cxb:hover{border-bottom-style:solid;color:var(--terracotta)}
  .sitebar{display:flex;justify-content:space-between;align-items:center;gap:16px;
    padding:18px 0;font-size:13px;border-bottom:1px solid var(--line);margin-bottom:8px;flex-wrap:wrap}
  .sitebar a{color:var(--teal-deep);text-decoration:none;font-weight:600}
  .sitebar a:hover{color:var(--terracotta)}
  .sitebar .rt{color:var(--slate);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
  .linkbanner{background:var(--teal-tint);border:1px solid var(--green-line);border-radius:var(--radius-sm);
    padding:16px 20px;margin:22px 0 0;font-size:14.5px;color:var(--ink-soft);max-width:70ch;line-height:1.55}
  .linkbanner b{font-family:var(--body);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--teal-deep);display:block;margin-bottom:4px;font-weight:800}
  #gate{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;
    background:var(--cream);padding:24px}
  .gcard{width:100%;max-width:404px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow-lift);padding:40px 34px}
  .gk{font-family:var(--body);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--terracotta);font-weight:800;margin-bottom:12px}
  .gh{font-family:var(--head);font-weight:800;font-size:28px;color:var(--ink);margin:0 0 8px;letter-spacing:-.01em}
  .gp{color:var(--slate);font-size:15px;margin:0 0 22px;line-height:1.5}
  #gpw{width:100%;padding:13px 15px;border:1px solid var(--line-strong);border-radius:12px;
    font-family:var(--body);font-size:15px;background:var(--cream);color:var(--ink);margin-bottom:12px}
  #gpw:focus{outline:none;border-color:var(--terracotta);box-shadow:0 0 0 3px rgba(217,110,52,.15)}
  #gbtn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--terracotta);color:#fff;
    font-family:var(--head);font-weight:700;font-size:15px;cursor:pointer;transition:background .2s}
  #gbtn:hover{background:var(--rust)}
  .gerr{color:var(--rust);font-size:13px;margin-top:12px;min-height:16px;font-weight:600}
</style>


<style>
  .srcModal{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;
    background:rgba(10,14,13,.66);backdrop-filter:blur(4px);padding:24px}
  .srcModal.open{display:flex;animation:srcFade .16s ease}
  @keyframes srcFade{from{opacity:0}to{opacity:1}}
  .srcPanel{background:var(--paper);border:1px solid var(--line-strong);border-radius:10px;
    width:min(820px,100%);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .srcHead{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);
    font-family:var(--mono);font-size:12.5px;color:var(--slate);background:var(--card);flex:none}
  .srcHead .t{color:var(--ink);font-weight:600;letter-spacing:.02em}
  .srcHead .sp{flex:1}
  .srcHead a.full{color:var(--teal);text-decoration:none;border-bottom:1px dotted var(--teal)}
  .srcHead button{border:1px solid var(--line-strong);background:var(--paper);color:var(--ink);
    font-family:var(--mono);font-size:12px;border-radius:6px;padding:5px 11px;cursor:pointer;line-height:1}
  .srcHead button:hover{background:var(--paper-2)}
  .srcBody{overflow:auto;padding:18px;background:var(--paper-2)}
  .srcBody img{display:block;width:100%;height:auto;border:1px solid var(--line);border-radius:4px;
    background:#fff;box-shadow:0 6px 20px rgba(0,0,0,.12)}
  .srcCap{font-family:var(--mono);font-size:11px;color:var(--slate);text-align:center;margin-top:12px}
  @media (max-width:560px){.srcModal{padding:0}.srcPanel{border-radius:0;max-height:100%;height:100%}}
</style>

<div id="gate">
  <div class="gcard">
    <div class="gk">Blessin &middot; Protected Document</div>
    <h1 class="gh">Corby Opposition Brief</h1>
    <p class="gp">This document is password protected. Enter the password to continue.</p>
    <input id="gpw" type="password" placeholder="Password" autocomplete="current-password" aria-label="Password">
    <button id="gbtn" type="button">Unlock</button>
    <div id="gerr" class="gerr" role="alert"></div>
  </div>
</div>
<div id="app"></div>

<div class="srcModal" id="srcModal" role="dialog" aria-modal="true" aria-label="Source excerpt">
  <div class="srcPanel">
    <div class="srcHead">
      <span class="t">CEC Staff Assessment</span><span class="sp" id="srcPg"></span>
      <a class="full" id="srcFull" href="corby-staff-assessment.pdf" target="_blank" rel="noopener">Full page &nearr;</a>
      <button type="button" id="srcClose" aria-label="Close">Close &times;</button>
    </div>
    <div class="srcBody">
      <img id="srcImg" alt="Cited section of the CEC Staff Assessment">
      <div class="srcCap" id="srcCap"></div>
    </div>
  </div>
</div>
<script>
(function(){
  var PDF="corby-staff-assessment.pdf";
  var modal=document.getElementById('srcModal'),
      img=document.getElementById('srcImg'),
      body=document.querySelector('.srcBody'),
      pglab=document.getElementById('srcPg'),
      cap=document.getElementById('srcCap'),
      full=document.getElementById('srcFull');
  function open(pg){
    img.src='corby-src/p'+pg+'.png';
    full.href=PDF+'#page='+pg;
    pglab.textContent='the cited section';
    cap.textContent='Staff Assessment, p.'+pg+'  \u00b7  highlighted text is the language cited above';
    body.scrollTop=0;
    modal.classList.add('open');
    document.body.style.overflow='hidden';
  }
  function close(){modal.classList.remove('open');document.body.style.overflow='';}
  document.addEventListener('click',function(e){
    var a=e.target.closest&&e.target.closest('a.cx');
    if(a){e.preventDefault();open(a.getAttribute('data-pg'));return;}
    if(e.target===modal){close();}
  });
  document.getElementById('srcClose').addEventListener('click',close);
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&modal.classList.contains('open'))close();});
})();
</script>

  var gate=document.getElementById('gate'),inp=document.getElementById('gpw'),
      btn=document.getElementById('gbtn'),err=document.getElementById('gerr'),
      app=document.getElementById('app');
  function raw(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
  async function decrypt(pw){
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:raw(BLOB.salt),iterations:BLOB.iter,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw(BLOB.iv)},key,raw(BLOB.ct));
    return new TextDecoder().decode(pt);
  }
  async function submit(){
    err.textContent='';
    try{
      var content=await decrypt((inp.value||'').trim());
      app.innerHTML=content;
      try{sessionStorage.setItem('corby_ok',(inp.value||'').trim());}catch(e){}
      gate.parentNode.removeChild(gate);
      document.body.style.overflow='';
      window.scrollTo(0,0);
    }catch(e){err.textContent='Incorrect password.';inp.value='';inp.focus();}
  }
  btn.addEventListener('click',submit);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')submit();});
  document.body.style.overflow='hidden';
  var saved=null;try{saved=sessionStorage.getItem('corby_ok');}catch(e){}
  if(saved){inp.value=saved;submit();}else{inp.focus();}
})();
